<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忧郁郭推广</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at top, #2a1a4a, #0b0512);
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .logo {
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(200, 80, 255, 0.5);
        }
        .title {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #ff4444;
            text-shadow: 0 0 12px rgba(255, 60, 60, 0.7);
        }
        .content {
            font-size: 20px;
            line-height: 2.2;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 16px;
            display: inline-block;
            border: 1px solid rgba(180, 100, 255, 0.3);
        }
        .qr-code {
            width: 100%;
            max-width: 250px;
            border-radius: 10px;
            margin-top: 25px;
        }
    </style>
</head>
